<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="680" viewBox="0 0 1200 680" role="img" aria-labelledby="title desc">
  <title id="title">Fugu trainable surface</title>
  <desc id="desc">Diagram showing Fugu's 19456 trainable parameters split into 9216 singular value offsets and 10240 linear head weights.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#334155"/>
    </marker>
    <style>
      .title { font: 700 34px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #111827; }
      .subtitle { font: 500 17px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #475569; }
      .label { font: 700 20px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #111827; }
      .small { font: 500 15px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #475569; }
      .mono { font: 700 16px ui-monospace, SFMono-Regular, Consolas, monospace; fill: #1f2937; }
      .box { fill: #ffffff; stroke: #cbd5e1; stroke-width: 2; rx: 10; }
      .svf { fill: #ecfdf5; stroke: #22c55e; }
      .head { fill: #fff7ed; stroke: #f97316; }
      .frozen { fill: #f8fafc; stroke: #94a3b8; }
      .line { fill: none; stroke: #334155; stroke-width: 3; marker-end: url(#arrow); }
      .thin { fill: none; stroke: #94a3b8; stroke-width: 2; }
      .bar-a { fill: #22c55e; }
      .bar-b { fill: #f97316; }
      .bar-bg { fill: #e2e8f0; }
    </style>
  </defs>

  <rect width="1200" height="680" fill="#fbfdff"/>
  <text x="58" y="62" class="title">The trainable part is tiny: 19,456 numbers</text>
  <text x="60" y="94" class="subtitle">Fugu adapts a small routing surface while leaving the backbone and worker models frozen.</text>

  <rect x="80" y="150" width="1040" height="110" class="box"/>
  <text x="110" y="188" class="label">Flat checkpoint vector x</text>
  <text x="110" y="220" class="mono">N = 19,456 = 9,216 SVF offsets + 10,240 routing-head weights</text>
  <rect x="110" y="235" width="480" height="14" class="bar-a"/>
  <rect x="590" y="235" width="530" height="14" class="bar-b"/>

  <path d="M350 260 V315" class="line"/>
  <path d="M855 260 V315" class="line"/>

  <rect x="80" y="315" width="520" height="245" class="box svf"/>
  <text x="112" y="356" class="label">SVF offsets: 9 x 1024 = 9,216</text>
  <text x="112" y="388" class="small">Each selected matrix keeps U and V frozen.</text>
  <text x="112" y="418" class="small">Only singular-value scales move.</text>
  <text x="112" y="456" class="mono">sigma_k -> (1 + delta_k) sigma_k</text>
  <line x1="112" y1="482" x2="565" y2="482" class="thin"/>
  <text x="112" y="515" class="small">Matrices: embeddings, seven layer-26 projections, lm_head.</text>
  <text x="112" y="543" class="small">Purpose: adjust the representation seen by the router.</text>

  <rect x="680" y="315" width="440" height="245" class="box head"/>
  <text x="712" y="356" class="label">Routing head: 10 x 1024 = 10,240</text>
  <text x="712" y="388" class="small">Academic TRINITY emits 7 worker logits</text>
  <text x="712" y="416" class="small">plus 3 role logits.</text>
  <text x="712" y="456" class="mono">logits = W_head h</text>
  <line x1="712" y1="482" x2="1085" y2="482" class="thin"/>
  <text x="712" y="515" class="small">Product Fugu narrows this to worker selection only.</text>
  <text x="712" y="543" class="small">Purpose: choose who acts next.</text>

  <rect x="80" y="600" width="1040" height="44" rx="10" class="frozen"/>
  <text x="110" y="628" class="small">Frozen: Qwen3 backbone directions, all worker-model weights, and the frontier providers behind the selected API calls.</text>
</svg>
